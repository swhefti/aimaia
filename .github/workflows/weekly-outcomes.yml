name: Weekly Outcomes Update
on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  outcomes:
    name: Update Outcome Datasets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Update score outcomes
        run: npx tsx backend/jobs/evaluate-optimizer.ts --score-outcomes
        timeout-minutes: 20
      - name: Update recommendation outcomes
        run: npx tsx backend/jobs/evaluate-optimizer.ts --outcomes
        timeout-minutes: 10
