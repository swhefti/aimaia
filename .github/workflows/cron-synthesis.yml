name: Run Synthesis
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger synthesis agent
        run: |
          curl -f -X GET https://aimaia.vercel.app/api/cron/synthesis \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
