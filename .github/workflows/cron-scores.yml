name: Run Scores and Conclusions
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scoring pipeline
        run: |
          curl -f -X GET https://aimaia-frontend.vercel.app/api/cron/scores \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
