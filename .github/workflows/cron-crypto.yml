name: Ingest Crypto Prices
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger crypto price ingestion
        run: |
          curl -f -X GET https://aimaia.vercel.app/api/cron/crypto-prices \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
